name: Sync Forks

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync (skip update check)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.detect.outputs.has_updates }}
      repos_to_sync: ${{ steps.detect.outputs.repos_to_sync }}
    steps:
      - name: Check upstream updates
        id: detect
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set +e
          declare -A FORKS=(
            [openclaw]="openclaw/openclaw"
            [A-Worker-Panel]="bia-pain-bache/BPB-Worker-Panel"
            [MoonTV]="samqin123/MoonTV"
            [opengemini]="PublicAffairs/openai-gemini"
            [AI-Worker-Proxy]="zxcloli666/AI-Worker-Proxy"
            [cng]="noizo/cng"
            [LunaTV]="MoonTechLab/LunaTV"
            [Cloudflare-vless-trojan]="yonggekkk/Cloudflare-vless-trojan"
            [aisentia]="pushpendradwivedi/aisentia"
            [note-gen]="codexu/note-gen"
            [1688-Scraper-MCP]="xiayumu034-crypto/1688-Scraper-MCP"
            [E5_Developer_Renew]="KKtheGhost/E5_Developer_Renew"
            [cloudflare-hono-starter]="TyposBro/cloudflare-hono-starter"
            [MCP-Server-Framework]="MP-Tool/mcp-server-framework"
          )

          if [ "${{ github.event.inputs.force_sync }}" = "true" ]; then
            echo "🔄 Force sync requested, skipping update check"
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "repos_to_sync=ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          TO_SYNC=""
          for repo in "${!FORKS[@]}"; do
            upstream="${FORKS[$repo]}"
            is_fork=$(gh api "repos/21967201/$repo" --jq '.fork' 2>/dev/null || echo "false")
            [ "$is_fork" != "true" ] && continue

            default_branch=$(gh api "repos/21967201/$repo" --jq '.default_branch' 2>/dev/null || echo "main")
            behind=$(gh api "repos/21967201/$repo/compare/$upstream:$default_branch...$default_branch" --jq '.behind_by // 0' 2>/dev/null || echo "0")

            if [ "$behind" -gt 0 ] 2>/dev/null; then
              echo "📦 $repo is $behind commits behind $upstream"
              TO_SYNC="$TO_SYNC $repo"
            fi
          done

          if [ -n "$TO_SYNC" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "repos_to_sync=$TO_SYNC" >> $GITHUB_OUTPUT
            echo "🔍 Repos with updates:$TO_SYNC"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "repos_to_sync=" >> $GITHUB_OUTPUT
            echo "✅ All forks are up to date, skipping sync"
          fi

  sync:
    needs: check
    if: needs.check.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Sync forked repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPOS_TO_SYNC: ${{ needs.check.outputs.repos_to_sync }}
        run: |
          set +e
          echo "=== Fork Sync Started at $(date -u) ==="
          echo ""

          declare -A FORKS=(
            [openclaw]="openclaw/openclaw"
            [A-Worker-Panel]="bia-pain-bache/BPB-Worker-Panel"
            [MoonTV]="samqin123/MoonTV"
            [opengemini]="PublicAffairs/openai-gemini"
            [AI-Worker-Proxy]="zxcloli666/AI-Worker-Proxy"
            [cng]="noizo/cng"
            [LunaTV]="MoonTechLab/LunaTV"
            [Cloudflare-vless-trojan]="yonggekkk/Cloudflare-vless-trojan"
            [aisentia]="pushpendradwivedi/aisentia"
            [note-gen]="codexu/note-gen"
            [1688-Scraper-MCP]="xiayumu034-crypto/1688-Scraper-MCP"
            [E5_Developer_Renew]="KKtheGhost/E5_Developer_Renew"
            [cloudflare-hono-starter]="TyposBro/cloudflare-hono-starter"
            [MCP-Server-Framework]="MP-Tool/mcp-server-framework"
          )

          SUCCESS=0
          FAIL=0
          SKIP=0

          for repo in "${!FORKS[@]}"; do
            upstream="${FORKS[$repo]}"

            if [ "$REPOS_TO_SYNC" != "ALL" ]; then
              echo "$REPOS_TO_SYNC" | grep -qw "$repo" || continue
            fi

            echo "--- Syncing 21967201/$repo ← $upstream ---"

            default_branch=$(gh api "repos/21967201/$repo" --jq '.default_branch' 2>/dev/null || echo "main")
            echo "  Default branch: $default_branch"

            result=$(gh api -X POST "repos/21967201/$repo/merge-upstream" -f branch="$default_branch" 2>&1) || true

            if echo "$result" | grep -q '"merge_type":"none"\|"message":"This branch is not behind'; then
              echo "  ✅ Already up to date"
              ((SKIP++))
            elif echo "$result" | grep -q '"merge_type":"merge"\|"merge_type":"fast-forward"'; then
              echo "  ✅ Synced successfully"
              ((SUCCESS++))
            else
              echo "  ⚠ Result: $result"
              if echo "$result" | grep -q "conflict\|merge conflict\|409"; then
                echo "  ❌ Sync failed (conflicts)"
                ((FAIL++))
              else
                echo "  ✅ Sync attempted"
                ((SUCCESS++))
              fi
            fi
          done

          echo ""
          echo "=== Sync Summary ==="
          echo "  Synced: $SUCCESS"
          echo "  Failed: $FAIL"
          echo "  Skipped: $SKIP"
          echo "  Total: $((SUCCESS + FAIL + SKIP))"

          [ "$FAIL" -gt 0 ] && exit 1
          exit 0
